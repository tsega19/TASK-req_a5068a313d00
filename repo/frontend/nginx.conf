server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Declared here so we can resolve the `backend`
    # upstream at request time instead of at config load time — otherwise
    # nginx crashes with `host not found in upstream` whenever the backend
    # container happens to be restarting.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — avoids CORS and keeps the WASM bundle origin-agnostic.
    # The `set` + variable form defers DNS resolution to per-request.
    # NOTE: when proxy_pass uses a variable, nginx disables URI substitution.
    # We therefore OMIT the trailing path so nginx forwards the request URI
    # verbatim (e.g. `/api/auth/login` stays `/api/auth/login` on the backend).
    location /api/ {
        set $backend_upstream "backend:8080";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/wasm application/json;
    gzip_min_length 1024;
}
