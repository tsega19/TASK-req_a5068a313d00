version: "3.9"

# FieldOps Kitchen & Training Console
# ALL environment variables live in this file.
# The backend reads these ONLY via the backend/config module.
#
# WARNING: DEVELOPMENT DEFAULTS ONLY.
# The values below (JWT_SECRET, AES_256_KEY_HEX, DEFAULT_ADMIN_PASSWORD) are
# known placeholders. They are accepted ONLY because DEV_MODE=true is set
# below. For a real deployment you MUST:
#   1. Set DEV_MODE=false (or remove it),
#   2. Replace JWT_SECRET / AES_256_KEY_HEX / DEFAULT_ADMIN_PASSWORD with
#      securely generated values - otherwise startup hard-fails with
#      "insecure placeholder detected",
#   3. Keep REQUIRE_ADMIN_PASSWORD_CHANGE=true so the seeded admin must rotate
#      their password on first login.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fieldops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fieldops
      POSTGRES_PASSWORD: fieldops_pw
      POSTGRES_DB: fieldops
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldops -d fieldops"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldops_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Database ---
      DATABASE_URL: postgres://fieldops:fieldops_pw@postgres:5432/fieldops
      DATABASE_MAX_CONNECTIONS: "10"

      # --- HTTP server ---
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      ENABLE_TLS: "false"
      TLS_CERT_PATH: ""
      TLS_KEY_PATH: ""

      # --- Auth ---
      JWT_SECRET: dev-jwt-secret-change-in-prod-0123456789abcdef
      JWT_EXPIRY_HOURS: "24"
      # iss / aud are verified on every request — change these per deployment
      # so a token minted for dev cannot be replayed against staging/prod.
      JWT_ISSUER: fieldops-backend
      JWT_AUDIENCE: fieldops-frontend
      ARGON2_MEMORY_KIB: "19456"
      ARGON2_ITERATIONS: "2"
      ARGON2_PARALLELISM: "1"

      # --- Encryption (AES-256 key, 32-byte hex) ---
      AES_256_KEY_HEX: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      # --- Logging ---
      LOG_LEVEL: info
      LOG_FORMAT: structured

      # --- Business rules ---
      SYNC_INTERVAL_MINUTES: "10"
      DEFAULT_SERVICE_RADIUS_MILES: "30"
      MAX_NOTIFICATIONS_PER_HOUR: "20"
      MAX_VERSIONS_PER_PROGRESS: "30"
      SOFT_DELETE_RETENTION_DAYS: "90"
      SLA_ALERT_THRESHOLDS: "0.75,0.90,1.00"
      NOTIFICATION_RETRY_MAX_ATTEMPTS: "5"
      NOTIFICATION_RETRY_BASE_SECONDS: "1"
      ON_CALL_HIGH_PRIORITY_HOURS: "4"

      # --- App behavior ---
      RUN_MIGRATIONS_ON_BOOT: "true"
      SEED_DEFAULT_ADMIN: "true"
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123

      # --- Security gating ---
      # DEV_MODE=true permits the dev-only placeholder secrets above. Set to
      # "false" in production: startup will then refuse to boot with any known
      # placeholder value for JWT_SECRET / AES_256_KEY_HEX / DEFAULT_ADMIN_PASSWORD.
      DEV_MODE: "true"
      REQUIRE_ADMIN_PASSWORD_CHANGE: "true"
    ports:
      - "8080:8080"

  # Test runner — uses the builder stage of the backend Dockerfile (has cargo
  # + full source tree) instead of the slim runtime image. Only activated when
  # `--profile tests` is passed to `docker compose`.
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    profiles: ["tests"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fieldops:fieldops_pw@postgres:5432/fieldops
      RUST_BACKTRACE: "1"
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: fieldops_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "8081:80"

  # Dockerized frontend wasm unit-test runner. Invoked by run_tests.sh under
  # the `tests` profile so the main test pipeline has zero host dependencies.
  # Uses the `tester` stage of frontend/Dockerfile; runs every
  # #[wasm_bindgen_test] in the crate via wasm-bindgen-test-runner + Node.
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: tester
    profiles: ["tests"]
    # No ports, no network deps — these are pure-logic tests, they don't
    # touch the backend or the DB.

  # Opt-in backend coverage runner. Uses the pre-built tarpaulin image so
  # we don't burn image-build time installing llvm-tools + cargo-llvm-cov
  # on every test run. Writes an HTML report + a Cobertura XML artifact
  # to the host under .tmp/coverage/.
  backend-coverage:
    image: xd009642/tarpaulin:latest
    profiles: ["coverage"]
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./.tmp/coverage:/coverage
    environment:
      DATABASE_URL: postgres://fieldops:fieldops_pw@postgres:5432/fieldops
      RUST_BACKTRACE: "1"
    entrypoint:
      - cargo
      - tarpaulin
      - --engine
      - llvm
      - --workspace
      - --out
      - Html
      - --out
      - Xml
      - --output-dir
      - /coverage
      - --timeout
      - "300"
      - --skip-clean
      - --
      - --test-threads=1

  # Dockerized E2E smoke runner. Lives on the compose default network so it
  # can reach the `frontend` service by hostname without needing host ports
  # published. Previously this step ran on the host with its own curl binary.
  #
  # Uses stock `alpine` (busybox ships sh/grep/sed) and installs curl on
  # boot — the alpine/curl pre-built tag has unstable versioning on Docker
  # Hub and the compose build cache was hitting `not found` 404s.
  e2e-smoke:
    image: alpine:3.20
    profiles: ["e2e"]
    depends_on:
      - frontend
      - backend
    volumes:
      - ./frontend/tests/e2e:/e2e:ro
    environment:
      FRONTEND_URL: http://frontend
      ADMIN_USER: admin
      ADMIN_PASS: admin123
    entrypoint: ["sh", "-c", "apk add --no-cache curl >/dev/null && sh /e2e/smoke.sh"]

volumes:
  pg_data:
